spring:
  application:
    name: chamaledger

  datasource:
    # This uses the Render URL if available, otherwise defaults to local
    # Added ?sslmode=require to fix the "requir" typo error
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chamaledger_db?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dialect is optional in Hibernate 6+, but kept for clarity

  flyway:
    enabled: false
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNA==}
  expiration: 86400000

