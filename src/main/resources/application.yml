spring:
  application:
    name: chamaledger
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chamaledger_db?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNA==}
  expiration: 86400000

# Third Party Integrations
app:
  africas-talking:
    api-key: ${AT_API_KEY}
    username: ${AT_USERNAME:sandbox}
  groq:
    api-key: ${GROQ_API_KEY}

# M-Pesa Daraja API Configuration
mpesa:
  consumer-key: ${MPESA_CONSUMER_KEY}
  consumer-secret: ${MPESA_CONSUMER_SECRET}
  grant-type: client_credentials
  auth-url: https://sandbox.safaricom.co.ke/oauth/v1/generate?grant_type=client_credentials
  stk-push-url: https://sandbox.safaricom.co.ke/mpesa/stkpush/v1/processrequest
  stk-query-url: https://sandbox.safaricom.co.ke/mpesa/stkpushquery/v1/query
  shortcode: "174379"
  passkey: "bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919"
  callback-url: ${MPESA_CALLBACK_URL}